<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Gifts - ألعاب وجوائز</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.6/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div class="app-container">
        
        <header class="custom-crypto-header">
            <div class="user-info-side">
                <div class="avatar-wrapper">
                    <img id="user-avatar" src="https://via.placeholder.com/40" alt="Avatar">
                </div>
                <div class="balance-details">
                    <span id="user-name">جاري التحميل...</span>
                    <div class="ton-balance-row">
                        <img src="https://ton.org/download/ton_symbol.svg" class="ton-mini-logo" alt="TON">
                        <span id="balance-view">0.00</span>
                    </div>
                </div>
            </div>
            
            <div class="wallet-action-side">
                <button id="custom-wallet-btn" class="connect-wallet-style">
                    <span id="wallet-icon-placeholder">👛</span>
                    <span id="wallet-text-placeholder">ربط المحفظة</span>
                </button>
                <div id="ton-connect-btn" style="display: none;"></div>
            </div>
        </header>

        <main>
            <div class="gift-box-section">
                <div class="gift-icon">🎁</div>
                <h2>بوت ربح الهدايا والجوائز</h2>
                <p>افتح الصناديق واربح هدايا وجوائز تليجرام المميزة!</p>
            </div>

            <div class="actions-grid">
                <div class="card">
                    <h3>صندوق هدايا برونزي 📦</h3>
                    <p>يحتوي على جوائز عشوائية ونقاط مضاعفة داخل البوت.</p>
                    <button class="btn buy-btn" onclick="buyItem(0.1, 'BRONZE_BOX')">شراء بـ 0.1 TON</button>
                </div>
                <div class="card">
                    <h3>صندوق الجوائز الذهبي 👑</h3>
                    <p>فرصة عالية جداً لربح ترقيات واشتراكات تليجرام المميز!</p>
                    <button class="btn buy-btn vip" onclick="buyItem(0.5, 'GOLD_BOX')">شراء بـ 0.5 TON</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="nav-item active">🎮 اللعبة</div>
            <div class="nav-item" onclick="alert('قريباً: لوحة المتصدرين!')">🏆 الصدارة</div>
        </footer>
    </div>

    <script src="script.js?v=777"></script>
</body>
</html>

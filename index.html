<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Gift & Rocket Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.6/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <div id="language-overlay" class="lang-modal">
        <div class="lang-box">
            <h2>اختر اللغة / Choose Language</h2>
            <p>يرجى تحديد لغة الواجهة المفضلة لبدء اللعب</p>
            <div class="lang-buttons">
                <button onclick="selectLanguage('ar')">العربية 🇸🇦</button>
                <button onclick="selectLanguage('en')">English 🇬🇧</button>
            </div>
        </div>
    </div>

    <div id="prize-modal" class="prize-overlay" style="display: none;">
        <div class="prize-card animate-pop">
            <h2 id="prize-modal-title">🎉 مبروك الفوز!</h2>
            <div class="prize-image-container">
                <img id="prize-modal-img" src="" alt="Prize">
            </div>
            <h3 id="prize-modal-name">اسم الهدية</h3>
            <p id="prize-modal-value">القيمة: 0.00 TON</p>
            <button onclick="closePrizeModal()" class="close-prize-btn">رائع! / Awesome</button>
        </div>
    </div>

    <div class="app-container">
        <header class="custom-crypto-header">
            <div class="user-info-side">
                <div class="avatar-wrapper" id="avatar-container">
                    <img id="user-avatar" src="" alt="User" style="display:none;">
                    <div id="user-avatar-fallback" class="avatar-fallback">ع</div>
                </div>
                <div class="balance-details">
                    <span id="user-name">علي</span>
                    <div class="ton-balance-row">
                        <img src="https://epicgift.app/assets/images/ton_symbol.svg" class="ton-mini-logo" alt="TON">
                        <span id="header-balance-view">0.00</span>
                    </div>
                </div>
            </div>
            <div class="wallet-action-side">
                <button id="deposit-nav-btn" class="deposit-button-style">
                    <span>🖲️ Deposit</span>
                </button>
            </div>
        </header>

        <main>
            <div id="game-view-section" class="view-section">
                
                <div class="rocket-game-card">
                    <div class="card-tag">🚀 ROCKET GAME</div>
                    <div id="rocket-animation-area" class="rocket-sky">
                        <img id="rocket-sprite" src="https://epicgift.app/assets/rocket-banner/rocket.png" class="rocket-element" alt="Rocket">
                        <div id="live-multiplier">1.00x</div>
                    </div>
                    <div class="rocket-controls">
                        <button id="place-bet-btn" onclick="startRocketRound()">Place Bet</button>
                    </div>
                </div>

                <h3 id="section-boxes-title">📦 الصناديق والمكافآت النشطة</h3>
                <div class="boxes-grid">
                    
                    <div class="gift-box-card variant-premium">
                        <div class="neon-box-icon">🎁✨</div>
                        <div class="box-info-text">
                            <h4 class="box-name">Free 24h Box</h4>
                            <p class="box-desc" id="box-cooldown-text">صندوق مجاني كل 24 ساعة أو الدفع (0.5 TON)</p>
                        </div>
                        <button class="open-box-btn" id="open-box-action-btn" onclick="tryOpenFreeBox()">Open</button>
                    </div>

                </div>
            </div>

            <div id="deposit-view-section" class="view-section" style="display: none;">
                <div class="top-up-container">
                    <button id="back-to-game-btn" class="back-btn">⬅️ العودة للعبة / Back</button>
                    <h3>Top Up Balance</h3>
                    
                    <div class="wallet-status-badge">
                        <span>رصيد المحفظة المتصلة: </span>
                        <span id="wallet-connected-balance" style="font-weight:bold; color:#2ecc71;">غير متصلة</span>
                    </div>

                    <div class="input-wrapper">
                        <input type="number" id="deposit-amount-input" value="1" min="0.1" step="0.1">
                        <div class="input-sticker-wrapper">
                            <img src="https://epicgift.app/assets/images/ton_symbol.svg" class="input-ton-logo-inner" alt="TON">
                            <span class="input-ton-text">TON</span>
                        </div>
                    </div>

                    <div class="quick-deposit-buttons">
                        <button onclick="setAmount(1)">+1 TON</button>
                        <button onclick="setAmount(5)">+5 TON</button>
                        <button onclick="setAmount(10)">+10 TON</button>
                    </div>

                    <button id="execute-deposit-btn" class="main-deposit-execute-btn">Top Up</button>
                </div>
            </div>
        </main>
    </div>

    <div id="ton-connect-hidden-element" style="display: none;"></div>
    <script src="script.js?v=997"></script>
</body>
</html>
